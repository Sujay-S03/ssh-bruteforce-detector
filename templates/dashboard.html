<!DOCTYPE html>
<html>
<head>
    <title>SSH Brute Force Dashboard</title>
    <meta http-equiv="refresh" content="5">
    <style>

        body{
            font-family: Arial;
            background-color: #121212;
            color: white;
            padding: 20px;
        }

        h1{
            color: #00ff99;
        }

        table{
            width: 90%;
            border-collapse: collapse;
            background-color: #1e1e1e;
        }

        th, td{
            padding: 12px;
            border: 1px solid #333;
            text-align: center;
        }

        th{
            background-color: #00aa66;
            color: white;
        }

        tr:nth-child(even){
            background-color: #2b2b2b;
        }

    </style>

</head>

<body>

    <h1>SSH Brute Force Detection Dashboard</h1>

    <table>

        <tr>
            <th>ID</th>
            <th>IP Address</th>
            <th>Failed Attempts</th>
            <th>Attack Time</th>
        </tr>

        {% for attack in attacks %}

        <tr>
            <td>{{ attack[0] }}</td>
            <td>{{ attack[1] }}</td>
            <td>{{ attack[2] }}</td>
            <td>{{ attack[3] }}</td>
        </tr>

        {% endfor %}

    </table>

</body>
</html>
